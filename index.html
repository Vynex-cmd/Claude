<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>profile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Outfit',sans-serif;background:#0a0a0f;color:#fff}

.bg{position:fixed;inset:0;background:url('images/background.png') center/cover;z-index:-1}

.card{max-width:700px;margin:20px auto;padding:20px;background:rgba(255,255,255,0.05);border-radius:16px}

.banner{height:120px;background:url('images/banner.png') center/cover;border-radius:12px;margin:-20px -20px 10px}

.avatar{width:80px;height:80px;border-radius:50%;margin-top:-40px}

.badges{display:flex;gap:8px;margin:5px 0}
.badges img{width:30px;height:30px}

/* SPOTIFY CARD */
.spotify-card{
display:flex;
gap:15px;
align-items:center;
background:rgba(255,255,255,0.07);
padding:10px;
border-radius:12px;
margin-top:10px;
transition:0.3s;
}
.spotify-card:hover{
transform:scale(1.03);
box-shadow:0 0 20px rgba(30,215,96,0.5);
}

.spotify-cover{
width:70px;
height:70px;
border-radius:8px;
object-fit:cover;
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.9)}
to{opacity:1;transform:scale(1)}
}

.spotify-text{
display:flex;
flex-direction:column;
}

button{margin:5px}
</style>
</head>

<body>

<div class="bg"></div>

<!-- PROFILE -->
<div class="card">
<div class="banner"></div>

<div style="display:flex;gap:15px;align-items:center">
<img src="images/pfp.png" class="avatar">

<div>
<h2>username</h2>
<div class="badges" id="badges"></div>
<p>your bio here</p>
</div>
</div>
</div>

<!-- DISCORD -->
<div class="card">
<h3>Discord</h3>

<img id="discord-avatar" width="60">
<div id="discord-name"></div>
<div id="discord-handle"></div>
<div id="discord-status"></div>
<div id="discord-badges"></div>
<div id="discord-activity"></div>

<!-- SPOTIFY CUSTOM CARD -->
<div class="spotify-card">
<img id="cover" class="spotify-cover">
<div class="spotify-text">
<div id="song"></div>
<div id="artist"></div>
</div>
</div>

<iframe id="spotify" width="100%" height="80"></iframe>
</div>

<!-- MUSIC -->
<div class="card">
<h3>Music</h3>

<div id="title"></div>
<div id="artist2"></div>

<button id="prev">⏮</button>
<button id="play">▶</button>
<button id="next">⏭</button>

<audio id="audio"></audio>
</div>

<script>
const USER_ID="YOUR_DISCORD_ID";

const FALLBACK={
username:"yourname",
tag:"#0001",
avatar:"images/pfp.png",
song:"Fallback Song",
artist:"Artist",
cover:"https://i.scdn.co/image/ab67616d0000b2734f8f5e3e1c2c6f8c7c0d9b7f",
track:"4piafr7YSZHYgPvH4n4NeE"
};

// BADGES
["badge1.png","badge2.png","badge3.png","badge4.png","badge5.png"].forEach(b=>{
let i=document.createElement("img");
i.src="images/"+b;
badges.appendChild(i);
});

// MUSIC PLAYER
const tracks=[
{t:"Track 1",a:"Artist",s:"music/track1.mp3"},
{t:"Track 2",a:"Artist",s:"music/track2.mp3"},
{t:"Track 3",a:"Artist",s:"music/track3.mp3"}
];

let x=0;
function load(i){
audio.src=tracks[i].s;
title.textContent=tracks[i].t;
artist2.textContent=tracks[i].a;
}
load(0);

play.onclick=()=>audio.paused?(audio.play(),play.textContent="⏸"):(audio.pause(),play.textContent="▶");
next.onclick=()=>load(x=(x+1)%tracks.length);
prev.onclick=()=>load(x=(x-1+tracks.length)%tracks.length);

// DISCORD
async function discord(){
try{
let r=await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
let j=await r.json();
if(!j.success) throw "err";

let d=j.data;

discord-name.textContent=d.discord_user.username;
discord-handle.textContent="#"+d.discord_user.discriminator;
discord-avatar.src=`https://cdn.discordapp.com/avatars/${USER_ID}/${d.discord_user.avatar}.png`;

discord-status.textContent=d.discord_status;

if(d.listening_to_spotify){
song.textContent=d.spotify.song;
artist.textContent=d.spotify.artist;
cover.src=d.spotify.album_art_url;

spotify.src=`https://open.spotify.com/embed/track/${d.spotify.track_id}`;
}else{
throw "no spotify";
}

}catch(e){
// FALLBACK
discord-name.textContent=FALLBACK.username;
discord-handle.textContent=FALLBACK.tag;
discord-avatar.src=FALLBACK.avatar;
discord-status.textContent="offline";

song.textContent=FALLBACK.song;
artist.textContent=FALLBACK.artist;
cover.src=FALLBACK.cover;

spotify.src=`https://open.spotify.com/embed/track/${FALLBACK.track}`;
}
}

discord();
setInterval(discord,15000);
</script>

</body>
</html>
